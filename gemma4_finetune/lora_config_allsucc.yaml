# FILTER-VS-VOLUME ablation arm for the won-only gate (2026-06-13).
#
# Hyperparameters IDENTICAL to lora_config_gate.yaml. The ONLY difference is
# the corpus: matched 2500 rows / 32 games (7 won + 25 lost, 38% won-rows)
# drawn from the natural success mix, vs the gate's 2492 / 18 / 100% won.
# Same 13 eval decks held out of both. So gate-vs-allsucc isolates the
# won/lost FILTER from data volume.
#
# corpus: data/dataset/training_allsucc_matched.jsonl -> dataset_allsucc
#   build_allsucc_matched_corpus.py -> prepare_dataset.py --out dataset_allsucc
#   split 2148 train / 191 valid / 161 test.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_allsucc"

adapter_path: "adapters_allsucc"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to gate/v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to gate/v5/v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
