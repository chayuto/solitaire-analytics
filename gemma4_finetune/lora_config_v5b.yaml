# v5b: Gemma 4 E2B Text (apache-2.0), WON-GAMES-ONLY corpus, fence-strip recovered.
#
# Identical recipe to lora_config_v5.yaml EXCEPT data + adapter_path. v5b exists to
# test whether v5's overfit (val loss diverged from iter 100 on 892 examples) was a
# pure VOLUME problem: dataset_v5b recovers the 621 won turns prepare_dataset.py was
# dropping for a ```json markdown fence (strip_code_fence fix, 2026-05-31), giving
# 1513 usable (1245 train / 145 valid / 123 test). NOTE the seed skew is NOT fixed
# (3263196305 still ~41%, it is structurally the longest won game); v5b isolates
# volume, not diversity. Every hyperparameter below must stay identical to v5.
#
# Run via train_v2.py so gemma4_text_patch loads before mlx_lm.load.

# Pre-quantized 4-bit model -- do NOT load FP16 and quantize locally (init OOM).
model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_v5b"

adapter_path: "adapters_v5b"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to v5/v2; explicit keys so the target
#     modules match v5 exactly -- omitting them changes mlx-lm's default sweep
#     and would confound the v5b-vs-v5 volume comparison) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
