# COMBINE: close-out recipe corpus + solver-grounded rows (2026-06-22, staged).
# volsolver and volcloseout each win 8/13 in-dist but on COMPLEMENTARY decks
# (volsolver wins 1388178981 + 3263196305 which volcloseout bricks; volcloseout
# wins 350743738 + 4197389931 which volsolver bricks). This arm tries to capture
# both: the close-out corpus (dataset_volcloseout, won + fd<=2 oversample) plus
# the 700 solver-grounded winning-play rows.
#
# WATCH for the strategy-combo failure mode (volcombo): there, the close-out
# oversample swamped the strategy rows' resign signal and the levers interfered
# (8 -> 6). Solver rows are play-targets not resign-targets, so the interaction
# may differ, but the same swamping risk applies. Only worth running AFTER the
# footprint control confirms the solver FORM is the lever.
#
# valid/test byte-identical to volcloseout. Hypers IDENTICAL to all arms.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_volsolvercloseout"

adapter_path: "adapters_volsolvercloseout"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to all arms) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to all arms) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
