# SOLVER-GROUNDED play-matched rows on the VOLUME corpus (2026-06-21).
# Step 4 of docs/reports/20260621_data_volume_and_strategy_text_eval.md: escalate
# strategy text from hand-authored declarative Q&A (form 1, volstrategy 7/13) to
# solver-grounded DECISIONS in the exact v1.6 play format (form 3).
#
# dataset_volsolver = volume train + N solver-grounded rows
# (build_solver_grounded_corpus.py -> solver_grounded_rows.jsonl, mixed by
# build_volsolver_corpus.py). Each added row is a byte-faithful v1.6 board prompt
# whose target picks a PROVABLY-WINNING legal move (sound best-first engine
# solver), with a natural strategic rationale. Unlike the teacher rows (~31%
# ceiling), the move is solver-optimal-winning, so this tests whether grounding
# the targets in solver-correct play lifts win rate past the teacher ceiling.
# valid/test byte-identical to volume, so volsolver-vs-volume isolates the solver
# rows and volsolver-vs-volstrategy compares form 3 against form 1.
#
# Compare on the 13 held-out decks @ cap 300:
#   volsolver > volstrategy (>7) and ideally >= volcloseout (8) -> solver-grounded
#     targets beat hand-authored principles; escalate (more rows, then combine
#     with the close-out recipe).
#   volsolver ~= volume -> play-matched solver rows do not transfer at this
#     fraction; revisit row count / rationale form before more solver investment.
#
# Hypers IDENTICAL to volume/volcloseout/volstrategy so the only variable is the
# corpus composition.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_volsolver"

adapter_path: "adapters_volsolver"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/volcloseout/volstrategy) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/volcloseout/volstrategy) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
