# Smoke variant of lora_config_v2.yaml: 30 iters, frequent reporting, single
# checkpoint. Run via:
#   gemma4_finetune/venv/bin/python gemma4_finetune/train_v2.py \
#     --config gemma4_finetune/lora_config_v2_smoke.yaml

model: "mlx-community/Gemma4-E2B-IT-Text-int4"
train: true
data: "dataset_v2"
adapter_path: "adapters_v2_smoke"

max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

learning_rate: 2.0e-4
iters: 30
steps_per_report: 5
steps_per_eval: 15
save_every: 30
val_batches: 5

lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
