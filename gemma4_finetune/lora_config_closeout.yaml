# CLOSE-OUT augmentation arm (2026-06-17). Tests whether oversampling won-game
# close-out behaviour (foundation plays at a revealed fd<=2 endgame) fixes the
# loopcompress false-resign failure: the student reaches winnable fd=0 endgames
# with direct legal foundation plays available and resigns anyway (replay-verified
# on decks 2703165610/3123337720/4221577640/3263196305 this session).
#
# corpus: gemma4_finetune/dataset_closeout (built by build_closeout_corpus.py).
#   = the PINNED loopcompress split with TRAIN-ONLY 2x oversample of (won-session
#     AND faceDown<=2) rows. valid/test are byte-identical to dataset_loopcompress,
#     so closeout-vs-loopcompress isolates exactly the augmentation and val loss
#     stays comparable. train 7086 (5458 base + 1628 copies of 814 close-out rows).
#   draw-safe: post-aug train is 39.0% draws (base 45.9%; v7 starvation was 0.5%),
#     foundation share 22% -> 33.7%.
#
# Compare closeout vs loopcompress on the 13 held-out decks @ cap 300:
#   closeout converts the 4 false-resign decks (won, or resign->SOLVED removed) ->
#     recipe is loop-compress + close-out augmentation (projected ~8 wins).
#   closeout ~= loopcompress -> the close-out gap is not fixable by SFT reweighting;
#     escalate to a resign penalty / preference signal.
# Hypers IDENTICAL to volume/gate/allsucc/loopcompress so the only variable is the
# corpus reweighting.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_closeout"

adapter_path: "adapters_closeout"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/gate/allsucc/loopcompress/v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/gate/allsucc/loopcompress/v5/v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
