# Strategy-text PROBE (2026-06-20): does mixing declarative Klondike strategy
# Q&A into the SFT corpus improve full-game play, or only teach recitation?
#
#   ARM   volstrategy = volume corpus + 27 hand-authored draw-1 strategy Q&A rows
#         oversampled x12 (324 rows, 5.4% of train); valid/test = volume's.
#         Principles target measured failure modes (reveal pass-up, loops,
#         foundation over-eagerness, false-resign). build_volstrategy_corpus.py.
#   READ  wins/meanFC vs volume's stable 5/13 (pure strategy effect, same pool),
#         AND the temp-0.3 JSON parse-rescue rate (prose rows may erode JSON
#         discipline). recites-well != plays-well, so judge full-game adjudicated.
# Hypers identical to volume/volcloseout (isolates the corpus change).

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_volstrategy"

adapter_path: "adapters_volstrategy"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/volcloseout/gate/allsucc/v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/volcloseout/gate/allsucc/v5/v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
