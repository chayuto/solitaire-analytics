# v3 LoRA config: same as v2 except for the data source.
#
# v3 hypothesis: removing direct-reversal teacher turns from the training
# corpus will preserve untuned Gemma 4 E2B's oscillation-recognition strength
# while still teaching the foundation-move skill.
#
# Data prepared via:
#   python gemma4_finetune/filter_shuffles.py \\
#       --in data/dataset/training.jsonl \\
#       --out data/dataset/training_shuffle_filtered.jsonl
#   cd gemma4_finetune && venv/bin/python prepare_dataset.py \\
#       --log ../data/dataset/training_shuffle_filtered.jsonl \\
#       --out dataset_v3
#
# Run via train_v2.py (it forwards to mlx_lm.lora.main) with --config flag.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true
data: "dataset_v3"
adapter_path: "adapters_v3"

# Same memory envelope as v2. Smaller dataset (filtered) -> fewer iters
# per epoch; iters: 1000 keeps total compute parity with v2 even if epoch
# count drifts slightly. Revisit if filtered dataset drops > 30%.
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
