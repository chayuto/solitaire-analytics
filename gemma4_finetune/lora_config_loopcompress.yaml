# LOOP-COMPRESSION spike (2026-06-16). Tests whether removing the teacher's
# exact-state doom-loop cycle bodies (keeping the escapes WITH their real
# loop-context) improves imitation vs the full volume corpus.
#
# corpus: data/dataset/training_loopcompress.jsonl -> dataset_loopcompress
#   build_loopcompress_corpus.py -> prepare_dataset.py
#   split 5458 train / 487 valid / 589 test (vs volume 5663/531/665; SAME games,
#   379 exact-state cycle rows removed -- 301 of them from lost games).
# Exact-state (draw-safe) collapse: only net-no-op board repeats are removed, so
# the draw distribution is preserved -- avoids the v7 ORPO draw-starvation
# failure that a tableau-only (51% cut, mostly draws) key would have caused.
# 5.5% cut; small because pure draw-free tableau loops are rare.
#
# Compare loopcompress vs volume on the 13 held-out decks:
#   loopcompress > volume -> exact loops were poisoning imitation; this is a recipe.
#   loopcompress ~= volume -> exact loops are NOT the bottleneck (the likely
#     outcome: at iters=1000 the corpora differ by only ~55 of ~1000 seen rows).
# Hypers are IDENTICAL to volume/gate/allsucc so the only variable is the corpus.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_loopcompress"

adapter_path: "adapters_loopcompress"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/gate/allsucc/v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/gate/allsucc/v5/v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
