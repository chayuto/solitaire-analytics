# STaR expert-iteration round 1 (2026-06-25). The on-policy pivot's first
# training step: after the best-of-N gate showed the volume student SAMPLES wins
# on winnable decks it loses greedily (pass@5 = 2/7+, ~8%/sample), fine-tune on
# those self-wins and re-measure generalization.
#
# Arm design follows the house ablation style (volume/closeout/volstrategy/
# volsolver): a FRESH LoRA from the same int4 base on a corpus VARIANT, with the
# volume hypers held identical, so the held-out delta vs the volume adapter
# isolates exactly one change -- the added on-policy self-win rows.
#
# corpus: dataset_star_iter1 = dataset_volume train + (STaR self-win rows x4),
#   built by extract_star_corpus.py from the best-of-N WON trajectories
#   (drift-gated byte-faithful prompts, clean-JSON completions). valid/test are
#   reused from dataset_volume unchanged (STaR games too few to hold out).

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_star_iter1"

adapter_path: "adapters_star_iter1"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/gate/allsucc/v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/gate/allsucc/v5/v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
