# GATE re-test of won-only SFT on the faithful harness (2026-06-13).
#
# The v5 won-only HOLD verdict is void: it was graded on the broken single-turn
# bench and the unfaithful play harness. This run re-tests the same idea with
# (a) 2.4x the win corpus (36 won sessions vs 7), (b) a held-out eval design:
# the 13 tourA_v16_rescue benchmark decks are EXCLUDED from training
# (build_wononly_corpus.py --exclude-seeds ...) because the benchmark is built
# from teacher win records, so un-held-out eval is a memorization probe.
# Eval: paired full-game vs untuned base on the held-out decks, cap 200,
# faithful harness (tiered parse rescue), greedy. Base comparison numbers
# already exist in play_runs/tourA_v16_rescue.
#
# Gate (pre-committed, plan doc section 10.3): adapter beats base paired mean
# fc on held-out decks -> the data consumer is validated, scale the win
# harvest. Adapter <= base -> won-only as-executed fails even with more data;
# pivot to solver-as-teacher.
#
# Hyperparameters: IDENTICAL to lora_config_v5.yaml / v2 (one variable: the
# corpus). 1000 iters over 1881 train examples is ~0.5 epochs (v5: 1.5 epochs
# over 666); checkpoint every 250. Final checkpoint is the preregistered eval
# arm (checkpoint selection by val loss is a known-broken proxy; noted as a
# threat in the doc).
#
# corpus: data/dataset/training_wononly_gate.jsonl -> dataset_gate
#   2492 rows, 18 won games, split 1881 train / 148 valid / 463 test.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_gate"

adapter_path: "adapters_gate"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to v2/v5) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to v2/v5) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
