# VOLUME-on-more-data arm (2026-06-20). Same recipe as the `volume` lead,
# retrained on the CURRENT 31B success pool after the 2026-06-14 -> 2026-06-20
# harvest growth folded in +4 new gemma-4-31b-it WINS (#bd2080 150 rows,
# #211fcc 110, #fbfdf8 173, #adc679 127 = +560 winning-trajectory rows) plus
# other 31B sessions ingested in that window.
#
# Question: does +12% more winning teacher data (33 -> 37 winning sessions)
# move the plain-volume baseline off its stable 5/13 wins? This is the clean
# "+data" effect, isolated from the gentle-closeout RECIPE question (which the
# parallel volcloseout confirmation settles on the OLD pool).
#
# Pool: data/dataset/training.jsonl (9937 success rows / 102 games, the live
#   31B volume pool that loopcompress/allsucc also read) -> prepare_dataset.py
#   --seed 42 --ratios 0.8,0.1,0.1 -> dataset_volume_v0620
#   split 8115 train / 1027 valid / 795 test (vs old volume 5663/531/665).
#   Verified: none of the 4 new wins are on the 13 held-out eval decks.
# Hypers identical to volume/volcloseout/loopcompress/gate (isolates the corpus).

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_volume_v0620"

adapter_path: "adapters_volume_v0620"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/gate/allsucc/v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/gate/allsucc/v5/v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
