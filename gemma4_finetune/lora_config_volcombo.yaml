# CLOSE-OUT RECIPE + STRATEGY TEXT combo (2026-06-21).
# Follow-on to docs/reports/20260621_data_volume_and_strategy_text_eval.md step 2.
#
# The 2026-06-20 overnight chain established two independent, COMPLEMENTARY levers:
#   - volcloseout (volume + 1x close-out oversample): 8/13 wins, 0 resign, fixes
#     the winnable-endgame false-resign. The win lever.
#   - volstrategy (volume + 27 strategy Q&A rows x12): 7/13 wins, learned reliable
#     DEAD-board resign (4/5 correct) but over-resigned once on a winnable deck.
#     The dead-board-recognition lever.
# Hypothesis: stack them. Combo corpus = volcloseout train + the same 27 strategy
# rows x12 (build_volstrategy_corpus.py --src dataset_volcloseout). Target = the
# best of both: 8 wins and 0 false-resigns from the recipe, PLUS correct
# dead-board resigns from the strategy text (budget savings on truly-dead decks).
# Risk = the strategy resign principle re-introduces the over-resign the recipe
# otherwise cures; that is exactly what the in-dist eval measures.
#
# valid/test byte-identical to volume (carried through volcloseout), so the only
# variable vs volcloseout is the 324 strategy rows, and vs volstrategy is the
# close-out oversample. Compare on the 13 held-out decks @ cap 300:
#   wins >= 8 AND 0 false-resign AND >=1 correct dead-board resign -> ship combo.
#   wins < 8 OR a winnable deck resigned -> strategy resign fights the recipe;
#     keep volcloseout as lead and move resign handling to calibration (step 3).
#
# Hypers IDENTICAL to volume/volcloseout/volstrategy so the only variable is the
# corpus composition.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_volcombo"

adapter_path: "adapters_volcombo"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/volcloseout/volstrategy) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/volcloseout/volstrategy) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
