# FOOTPRINT CONTROL for the solver-grounded lever (2026-06-22).
# volsolver (dataset_volsolver) mixes 700 solver-grounded rows = 11% of train and
# tied the close-out recipe in-dist (8/13). Open question: is that win the FORM
# (solver-grounded decisions in the v1.6 play format) or just the extra VOLUME
# (11% more rows)? This arm holds the form constant and matches the FOOTPRINT to
# volstrategy: 324 solver rows = 5.4% of train (an even-stride downsample of the
# same 700, so the deal/progress diversity is preserved, only the count drops).
#
#   volsolver_lite ~= volsolver (8)  -> the win is the FORM; 324 rows suffice.
#   volsolver_lite ~= volume   (5)   -> the win needed the 11% volume, not the form.
#   volsolver_lite vs volstrategy (7) -> form 3 vs form 1 at IDENTICAL 5.4% footprint.
#
# valid/test byte-identical to volume (via build_volsolver_corpus.py), so this
# isolates exactly the 324 solver rows. Hypers IDENTICAL to volsolver/volume.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_volsolver_lite"

adapter_path: "adapters_volsolver_lite"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to volume/volsolver) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to volume/volsolver) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
