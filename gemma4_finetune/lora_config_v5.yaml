# v5: Gemma 4 E2B Text (apache-2.0), WON-GAMES-ONLY corpus.
#
# Isolates ONE variable vs v2: the training corpus is the game-level won/lost
# filter (keep only turns from games the 31B teacher WON) instead of all raw
# success turns. Base, hyperparameters, patch, trainer, runner, scorer all held
# identical to lora_config_v2.yaml so the v5-vs-v2 comparison is clean.
#
# `data: dataset_v5` is the game-level split of data/dataset/training_wononly.jsonl
# (1513 won turns from 10 won games; 892 usable after prepare_dataset drops 621
# rows missing the 3 required keys), built by:
#   build_wononly_corpus.py  ->  prepare_dataset.py --log training_wononly.jsonl --out dataset_v5
# Split: 666 train / 137 valid / 89 test.
#
# KNOWN LIMITATION (pre-registered): 10 won games but ONE seed (3263196305) is ~42%
# of usable examples; small + low-diversity, overfit risk is real. See
# docs/reports/20260530_v5_wononly_preregistration.md.
#
# train_v2.py applies gemma4_text_patch before mlx_lm.load so the int4 base loads.

# Pre-quantized 4-bit model -- do NOT load FP16 and quantize locally (init OOM).
model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_v5"

adapter_path: "adapters_v5"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
