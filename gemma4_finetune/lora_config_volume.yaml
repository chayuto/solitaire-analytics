# VOLUME-SCALING arm (2026-06-14). Follows the filter-vs-volume ablation,
# which found volume (not the won-only filter) is the lever: a matched 2500-row
# natural-mix arm tied the 100%-won gate, both beating base by ~12 fc.
#
# This arm tests whether MORE volume helps further: the ENTIRE non-eval success
# pool, 6859 rows / 77 games (36% won), same 13 eval decks held out, identical
# hypers. At fixed iters=1000 (batch 1) the model sees ~1000 examples, so this
# is "more UNIQUE/diverse data at fixed gradient budget" (5663 train examples,
# ~0.18 epoch) vs the matched arms' ~0.5 epoch over 1881 examples. If volume
# beats the matched 2500, "collect and train on more data" is quantitatively
# validated; if it ties or regresses, the matched volume already saturated.
#
# corpus: data/dataset/training_volume_full.jsonl -> dataset_volume
#   build_allsucc_matched_corpus.py --max-rows 0 -> prepare_dataset.py
#   split 5663 train / 531 valid / 665 test.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

data: "dataset_volume"

adapter_path: "adapters_volume"

# --- memory-bounded settings for 16 GB unified memory ---
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

# --- optimization (identical to gate/allsucc/v5/v2) ---
learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250
val_batches: 25

# --- LoRA hyperparameters (identical to gate/allsucc/v5/v2) ---
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
