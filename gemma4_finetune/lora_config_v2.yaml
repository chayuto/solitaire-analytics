# v2 LoRA config: distill 31B teacher into the patched text-only Gemma 4 E2B
# (apache-2.0). Mirrors v1's iter-750-winning hyperparameters; only the base
# model and dataset path differ.
#
# Run via train_v2.py (not directly with mlx_lm.lora) so that
# gemma4_text_patch is loaded before mlx_lm.load is called.

model: "mlx-community/Gemma4-E2B-IT-Text-int4"

train: true

# Game-level split of the 1635-row post-stall-filter training set
data: "dataset_v2"

adapter_path: "adapters_v2"

# memory-bounded for 16 GB unified memory; text-only base peaks at ~2.7 GB
# unloaded, so 2048-context training has more headroom than v1's run.
max_seq_length: 2048
batch_size: 1
num_layers: 16
grad_checkpoint: true

learning_rate: 2.0e-4
iters: 1000
steps_per_report: 10
steps_per_eval: 100
save_every: 250                # 4 checkpoints: 250 / 500 / 750 / 1000
val_batches: 25

lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
